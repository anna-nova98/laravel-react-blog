services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: blog-backend
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: blog
      DB_USERNAME: root
      DB_PASSWORD: root
      CORS_ALLOW_ORIGIN: "http://localhost:3000"
      APP_DEBUG: "false"
      APP_ENV: production
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: blog-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

  db:
    image: mysql:8
    container_name: blog-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: